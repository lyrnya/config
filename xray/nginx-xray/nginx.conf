
#user nobody nogroup;
worker_processes auto;

error_log /var/log/nginx/error.log; #错误日志的文件地址

pid /run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    map $ssl_preread_server_name $tcpsni_name {
        domain.example.com reality; # VLESS REALITY 域名
    }
    upstream reality {
        server 127.0.0.1:5443; # VLESS REALITY
    }
    server {
        listen 443;
        listen [::]:443;
        ssl_preread on;
        proxy_protocol on; #启用 PROXY protocol 发送（全局模式）
        proxy_pass $tcpsni_name;
    }
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 创建自定义变量 $client_ip 实现使用 CDN 后也能获取到客户端真实 IP
    map $http_x_forwarded_for $client_ip {
        "" $remote_addr;
        "~*(?P<firstAddr>([0-9a-f]{0,4}:){1,7}[0-9a-f]{1,4}|([0-9]{1,3}\.){3}[0-9]{1,3})$" $firstAddr;
    }

    # 启用访问日志
    log_format main '$client_ip - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main; # 访问日志的文件地址

    sendfile on;

    keepalive_timeout 65;

    server {
        listen 80;
        listen [::]:80;
        return 301 https://$host$request_uri; #HTTP 自动跳转 HTTPS，让网站看起来更真实
    }

    server {
        listen 443 quic reuseport; # 仅版本不小于 v1.25.0 且 SSL 库支持 QUIC 才配置，否则必须删除
        listen [::]:443 quic reuseport; # 仅版本不小于 v1.25.0 且 SSL 库支持 QUIC 才配置，否则必须删除
        listen 127.0.0.1:7443 ssl proxy_protocol; # 仅版本不小于 v1.25.1 才配置，否则必须删除
        http2 on; # 仅版本不小于 v1.25.1 才配置，否则必须删除
        set_real_ip_from 127.0.0.1;
        real_ip_header proxy_protocol;

        ssl_certificate /path/fullchain.crt; # 换成自己的证书
        ssl_certificate_key /path/cert.key; # 换成自己的密钥

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-CHACHA20-POLY1305; # RSA or ECDSA

        location /xhttp { # XHTTP Path
            grpc_pass grpc://127.0.0.1:2023; # VLESS XHTTP
            grpc_set_header Host $host;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location =/random-pic {
            proxy_pass http://127.0.0.1:1234;
        }

        location / {
            add_header Alt-Svc 'h3=":443"; ma=86400'; # HTTP/3
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; # HSTS
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            proxy_redirect off;
            proxy_pass http://127.0.0.1:5244;
            proxy_http_version 1.1;
            client_max_body_size 20000m; # the max size of file to upload
        }
    }
}
