services:
    random-api:
        container_name: random-api
        image: 'neixin/random-pic-api'
        ports:
            - 1234:80
        network_mode: bridge
        volumes:
            # 竖屏图片
            - ./portrait:/var/www/html/portrait
            # 横屏图片
            - ./landscape:/var/www/html/landscape
        restart: unless-stopped
