services:
    openlist:
        container_name: openlist
        image: openlistteam/openlist:latest
        network_mode: bridge
        ports:
            - 5244:5244
        volumes:
            - ./openlist:/opt/openlist/data
        user: 0:0
        environment:
            - UMASK=022
            - TZ=Asia/Shanghai
        restart: unless-stopped
